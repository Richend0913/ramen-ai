<!-- og.png 生成用テンプレート（1200x630）。メインがスクショしてリポジトリ直下に og.png として保存する。
     配色はこのデモサイト自身の墨×金（らぁ麺 玄 のブランド）。層カラー(L1緑)でなくデモの世界観を優先
     — og画像は「らぁ麺 玄」のページとして共有されるため。外部画像なし・CSSのみ。 -->
<meta charset="UTF-8">
<title>og-template: ramen-ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Zen+Kaku+Gothic+New:wght@400&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#333}
  .og{
    width:1200px;height:630px;position:relative;overflow:hidden;box-sizing:border-box;
    background:#141010;color:#f3ebdd;
    font-family:'Zen Kaku Gothic New',sans-serif;
    padding:72px 80px;display:flex;flex-direction:column;justify-content:space-between;
  }
  /* 面で光を置く（斜めストライプ禁止） */
  .og::before{content:"";position:absolute;inset:0;
    background:radial-gradient(80% 60% at 80% 0%,rgba(216,162,74,.18),transparent),
               radial-gradient(60% 50% at 10% 100%,rgba(209,64,47,.12),transparent)}
  .og *{position:relative}
  .eyebrow{font-size:22px;letter-spacing:.34em;color:#d8a24a;text-transform:uppercase}
  h1{font-family:'Yuji Syuku',serif;font-weight:400;font-size:92px;line-height:1.25;margin:18px 0 0;letter-spacing:.04em}
  h1 .ph{display:inline-block}
  h1 .kin{color:#e8bd6a}
  .sub{margin-top:22px;font-size:28px;color:#c9bda9;letter-spacing:.08em}
  .foot{display:flex;justify-content:space-between;align-items:flex-end}
  .brand{font-family:'Yuji Syuku',serif;font-size:40px;letter-spacing:.08em}
  .brand small{font-size:20px;color:#d8a24a;letter-spacing:.3em;margin-left:14px}
  .credit{font-size:20px;color:#c9bda9;letter-spacing:.12em}
</style>
<div class="og">
  <div>
    <p class="eyebrow">AI Clerk Demo — HP制作デモ（架空店）</p>
    <h1><span class="ph">澄んだ一杯に、</span><br><span class="ph">すべてを<span class="kin">込めて</span>。</span></h1>
    <p class="sub">混雑・アレルギー・テイクアウトに<br>24時間答える「AI店員」つきホームページ</p>
  </div>
  <div class="foot">
    <div class="brand">らぁ麺 玄<small>GEN · SHINJUKU</small></div>
    <div class="credit">NEXT GROWTH ／ BURNING BROS.</div>
  </div>
</div>
